<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1530" />
      <stop offset="100%" stop-color="#040814" />
    </radialGradient>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Gradients -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Outer Hexagonal / Shield Container -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)" />

  <!-- Shield Shape Outline -->
  <path d="M256,70 C340,70 380,105 380,180 C380,285 305,370 256,430 C207,370 132,285 132,180 C132,105 172,70 256,70 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.85" />

  <!-- Inner Shield Guard Lines (Cybersecurity theme) -->
  <path d="M256,92 C318,92 350,118 350,180 C350,265 292,340 256,392 C220,340 162,265 162,180 C162,118 194,92 256,92 Z" 
        fill="none" 
        stroke="#1e3a8a" 
        stroke-width="4" 
        opacity="0.4" />

  <!-- Neural Net Connections forming Monogram "Y" -->
  <g filter="url(#glowCyan)" opacity="0.95">
    <!-- Lines connecting the Y nodes -->
    <!-- Left Branch: Top-Left to Center -->
    <line x1="190" y1="150" x2="256" y2="230" stroke="url(#netGrad)" stroke-width="8" />
    <!-- Right Branch: Top-Right to Center -->
    <line x1="322" y1="150" x2="256" y2="230" stroke="url(#netGrad)" stroke-width="8" />
    <!-- Stem: Center to Bottom -->
    <line x1="256" y1="230" x2="256" y2="340" stroke="url(#netGrad)" stroke-width="8" />
    
    <!-- Secondary neural webs (AI background connections) -->
    <line x1="190" y1="150" x2="256" y2="130" stroke="#3b82f6" stroke-width="3" opacity="0.5" />
    <line x1="322" y1="150" x2="256" y2="130" stroke="#3b82f6" stroke-width="3" opacity="0.5" />
    <line x1="256" y1="130" x2="256" y2="230" stroke="#00f0ff" stroke-width="3" opacity="0.5" />
    <line x1="190" y1="150" x2="160" y2="230" stroke="#8b5cf6" stroke-width="3" opacity="0.4" />
    <line x1="160" y1="230" x2="256" y2="230" stroke="#8b5cf6" stroke-width="3" opacity="0.4" />
    <line x1="322" y1="150" x2="352" y2="230" stroke="#8b5cf6" stroke-width="3" opacity="0.4" />
    <line x1="352" y1="230" x2="256" y2="230" stroke="#8b5cf6" stroke-width="3" opacity="0.4" />
    <line x1="256" y1="340" x2="200" y2="300" stroke="#3b82f6" stroke-width="3" opacity="0.4" />
    <line x1="256" y1="340" x2="312" y2="300" stroke="#3b82f6" stroke-width="3" opacity="0.4" />
    
    <!-- Nodes (Outer & Inner Synapses) -->
    <!-- Secondary Nodes (Unfocused) -->
    <circle cx="256" cy="130" r="8" fill="#3b82f6" />
    <circle cx="160" cy="230" r="8" fill="#8b5cf6" />
    <circle cx="352" cy="230" r="8" fill="#8b5cf6" />
    <circle cx="200" cy="300" r="8" fill="#3b82f6" />
    <circle cx="312" cy="300" r="8" fill="#3b82f6" />

    <!-- Main Monogram "Y" Nodes (Cyan/Blue Glow) -->
    <!-- Top-Left Lobe -->
    <circle cx="190" cy="150" r="16" fill="#00f0ff" stroke="#ffffff" stroke-width="3" />
    <!-- Top-Right Lobe -->
    <circle cx="322" cy="150" r="16" fill="#00f0ff" stroke="#ffffff" stroke-width="3" />
    <!-- Core Center Synapse -->
    <circle cx="256" cy="230" r="20" fill="#ffffff" stroke="#00f0ff" stroke-width="4" />
    <!-- Bottom Stem Node -->
    <circle cx="256" cy="340" r="16" fill="#3b82f6" stroke="#ffffff" stroke-width="3" />
  </g>
</svg>